<!DOCTYPE html>
<html lang="sq" x-data="settingsCore()" :class="{ 'dark': settings.darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cilësimet | Ekselenca</title>
    






<!-- Barba.js për tranzicionet -->
<script src="https://unpkg.com/@barba/core"></script>
<!-- GSAP për animacionin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>






    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        pri: { 500: '#10b981', 600: '#059669', 950: '#020617' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' }
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .light .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }
        .toggle-dot { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input:checked ~ .toggle-bg { background-color: #10b981; }
        input:checked ~ .toggle-dot { transform: translateX(100%); }

        body { opacity: 0; transition: opacity 0.6s ease-in-out; }
        body.loaded { opacity: 1; }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-pri-950 text-slate-900 dark:text-white" :class="{ 'loaded': true }">

    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[20%] w-[60%] h-[40%] bg-pri-500/5 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative z-10 max-w-[1000px] mx-auto min-h-screen flex flex-col pb-40">
        
        <header class="pt-12 px-6 flex justify-between items-center sticky top-0 bg-inherit/20 backdrop-blur-md z-50">
            <div class="flex items-center gap-4">
                <div @click="pageTransition('index.html')" class="w-12 h-12 glass-card rounded-xl flex items-center justify-center cursor-pointer active:scale-90 transition-all">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                </div>
                <h1 class="text-2xl font-black tracking-tighter">Cilësimet</h1>
            </div>
        </header>

        <main class="mt-10 px-6 space-y-8">
            
            <section class="space-y-4">
                <h4 class="text-[11px] font-black uppercase tracking-[0.4em] opacity-40 px-2">Pamja & Stili</h4>
                <div class="glass-card p-6 rounded-[2.5rem] space-y-6">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-white/5 flex items-center justify-center text-pri-500">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            </div>
                            <span class="font-bold tracking-tight">Dark Mode</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" x-model="settings.darkMode" class="sr-only">
                            <div class="w-14 h-8 bg-slate-200 dark:bg-white/10 rounded-full toggle-bg"></div>
                            <div class="absolute left-1 top-1 bg-white w-6 h-6 rounded-full shadow-md toggle-dot"></div>
                        </label>
                    </div>

                    <div class="pt-4 border-t border-white/5">
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-40 mb-4">Ngjyra Kryesore</p>
                        <div class="flex gap-4">
                            <template x-for="color in accentColors">
                                <button @click="settings.accent = color" 
                                        :class="{'ring-4 ring-offset-4 ring-pri-500/20 scale-110': settings.accent === color}"
                                        class="w-10 h-10 rounded-full transition-all" :style="'background-color:' + color"></button>
                            </template>
                        </div>
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <h4 class="text-[11px] font-black uppercase tracking-[0.4em] opacity-40 px-2">Njoftimet</h4>
                <div class="glass-card p-6 rounded-[2.5rem] space-y-4">
                    <template x-for="notif in notificationOptions">
                        <div class="flex items-center justify-between py-2">
                            <div class="flex flex-col">
                                <span class="font-bold tracking-tight" x-text="notif.label"></span>
                                <span class="text-[10px] opacity-40" x-text="notif.desc"></span>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" x-model="notif.enabled" class="sr-only">
                                <div class="w-11 h-6 bg-slate-200 dark:bg-white/10 rounded-full toggle-bg"></div>
                                <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full shadow-md toggle-dot"></div>
                            </label>
                        </div>
                    </template>
                </div>
            </section>

            <section class="space-y-4">
                <h4 class="text-[11px] font-black uppercase tracking-[0.4em] opacity-40 px-2">Sistemi & Ruajtja</h4>
                <div class="grid grid-cols-1 gap-3">
                    <div @click="clearCache()" class="glass-card p-6 rounded-[2rem] flex items-center justify-between cursor-pointer active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 flex items-center justify-center">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </div>
                            <span class="font-bold tracking-tight">Pastro Memorien (Cache)</span>
                        </div>
                        <span class="text-[10px] font-black opacity-30 uppercase" x-text="cacheSize"></span>
                    </div>

                    <div @click="toggleOffline()" class="glass-card p-6 rounded-[2rem] flex items-center justify-between cursor-pointer active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-blue-500/10 text-blue-500 flex items-center justify-center">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            </div>
                            <span class="font-bold tracking-tight">Mënyra Offline</span>
                        </div>
                        <span class="text-[10px] font-black text-pri-500" x-text="offlineStatus"></span>
                    </div>
                </div>
            </section>

            <div class="text-center pt-8 space-y-2">
                <p class="text-[10px] font-black uppercase tracking-[0.5em] opacity-20">Ekselenca v2.1.0</p>
                <p class="text-[9px] font-bold opacity-30 italic text-pri-500">Krijuar me përkushtim për komunitetin</p>
            </div>

        </main>

        <nav class="fixed bottom-8 left-6 right-6 h-22 glass-card rounded-[3rem] flex items-center justify-around px-4 shadow-2xl z-[100] border border-white/10 max-w-[600px] mx-auto">
            <template x-for="nav in navigation">
                <a :href="nav.url" @click.prevent="pageTransition(nav.url)" 
                   class="relative flex flex-col items-center justify-center w-16 h-16 group transition-all"
                   :class="nav.active ? 'text-pri-500' : 'opacity-30 hover:opacity-100'">
                    <div class="group-hover:-translate-y-1 transition-transform duration-300" x-html="nav.icon"></div>
                    <span class="text-[8px] font-black uppercase tracking-widest mt-1.5" x-text="nav.label"></span>
                    <div x-show="nav.active" class="absolute -bottom-1 w-1 h-1 bg-pri-500 rounded-full"></div>
                </a>
            </template>
        </nav>
    </div>

    <script>
        function settingsCore() {
            return {
                settings: {
                    darkMode: localStorage.getItem('darkMode') === 'true',
                    accent: '#10b981'
                },
                cacheSize: '12.4 MB',
                offlineStatus: 'I Aktivizuar',
                accentColors: ['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b', '#ef4444'],

                notificationOptions: [
                    { label: 'Kujtuesit e Namazit', desc: 'Njofto 5 minuta para vaktit', enabled: true },
                    { label: 'Hadithi i Ditës', desc: 'Njoftim ditor në orën 09:00', enabled: false },
                    { label: 'Haptic Feedback', desc: 'Dridhje gjatë përdorimit të Tesbihut', enabled: true }
                ],

                navigation: [
                    { label: 'Kreu', url: 'index.html', active: false, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>' },
                    { label: 'Mëso', url: 'meso.html', active: false, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>' },
                    { label: 'Libraria', url: 'libraria.html', active: false, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>' },
                    { label: 'Settings', url: 'settings.html', active: true, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg>' }
                ],

                clearCache() {
                    if(confirm('A jeni të sigurt që dëshironi të pastroni të dhënat e ruajtura?')) {
                        this.cacheSize = '0 KB';
                        alert('Memoria u pastrua me sukses!');
                    }
                },

                toggleOffline() {
                    this.offlineStatus = this.offlineStatus === 'I Aktivizuar' ? 'I Çaktivizuar' : 'I Aktivizuar';
                },

                pageTransition(url) {
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = url; }, 500);
                },

                init() {
                    this.$watch('settings.darkMode', val => {
                        localStorage.setItem('darkMode', val);
                        if(val) document.documentElement.classList.add('dark');
                        else document.documentElement.classList.remove('dark');
                    });
                    window.addEventListener('load', () => document.body.classList.add('loaded'));
                }
            }
        }
    </script>
</body>
</html>
