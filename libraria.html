<!DOCTYPE html>
<html lang="sq" x-data="libraryCore()" :class="{ 'dark': settings.darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Libraria | Ekselenca</title>
    
    




<!-- Barba.js për tranzicionet -->
<script src="https://unpkg.com/@barba/core"></script>
<!-- GSAP për animacionin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>





    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        pri: { 500: '#10b981', 600: '#059669', 950: '#020617' },
                        gold: { 400: '#fbbf24', 500: '#f59e0b' }
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .light .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(16, 185, 129, 0.1);
        }
        .app-container { max-width: 1000px; }
        body { opacity: 0; transition: opacity 0.6s ease-in-out; }
        body.loaded { opacity: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-pri-950 text-slate-900 dark:text-white" :class="{ 'loaded': true }">

    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[20%] left-[-10%] w-[50%] h-[50%] bg-pri-500/5 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative z-10 app-container mx-auto min-h-screen flex flex-col pb-40">
        
        <header class="pt-12 px-6 flex justify-between items-center sticky top-0 bg-inherit/20 backdrop-blur-md z-50">
            <div class="flex items-center gap-4">
                <div @click="pageTransition('index.html')" class="w-12 h-12 glass-card rounded-xl flex items-center justify-center cursor-pointer active:scale-90 transition-all">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter">Libraria</h1>
                    <span class="text-[9px] font-black uppercase tracking-[0.3em] text-pri-600">Burimet & Referencat</span>
                </div>
            </div>
            <div class="w-12 h-12 bg-pri-500 rounded-xl flex items-center justify-center shadow-lg shadow-pri-500/20 text-white font-black text-xs">PDF</div>
        </header>

        <main class="mt-10 px-6 space-y-12">
            
            <section>
                <h4 class="text-[11px] font-black uppercase tracking-[0.4em] opacity-40 mb-5 px-2">Mjeti Interaktiv</h4>
                <div @click="count++" class="glass-card p-8 rounded-[3rem] text-center cursor-pointer group active:scale-95 transition-all border-b-8 border-pri-500">
                    <p class="text-[10px] font-black uppercase tracking-widest text-pri-500 mb-2">Prek për të bërë Dhikër</p>
                    <div class="text-6xl font-black tracking-tighter mb-4 transition-transform group-hover:scale-110" x-text="count"></div>
                    <div class="flex justify-center gap-4">
                        <button @click.stop="count = 0" class="px-4 py-2 bg-slate-100 dark:bg-white/5 rounded-full text-[9px] font-black uppercase tracking-widest">Reset</button>
                        <span class="px-4 py-2 bg-pri-500/10 text-pri-500 rounded-full text-[9px] font-black uppercase tracking-widest" x-text="targetReached"></span>
                    </div>
                </div>
            </section>

            <section class="space-y-6">
                <h4 class="text-[11px] font-black uppercase tracking-[0.4em] opacity-40 px-2">Koleksionet</h4>
                <div class="grid grid-cols-1 gap-4">
                    <template x-for="item in collections">
                        <div class="glass-card p-6 rounded-[2.5rem] flex items-center justify-between group cursor-pointer hover:border-pri-500/50 transition-all">
                            <div class="flex items-center gap-5">
                                <div class="w-14 h-14 rounded-2xl bg-slate-900 dark:bg-white/5 flex items-center justify-center text-pri-500 group-hover:bg-pri-500 group-hover:text-white transition-all" x-html="item.icon"></div>
                                <div>
                                    <h5 class="font-black tracking-tight text-lg" x-text="item.title"></h5>
                                    <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest" x-text="item.count"></p>
                                </div>
                            </div>
                            <div class="w-10 h-10 rounded-full glass-card flex items-center justify-center">
                                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <section>
                <div class="flex justify-between items-center mb-5 px-2">
                    <h4 class="text-[11px] font-black uppercase tracking-[0.4em] opacity-40">Audio & Recitime</h4>
                </div>
                <div class="space-y-4">
                    <div class="glass-card p-6 rounded-[2.5rem] flex items-center gap-6 border-l-8 border-gold-500">
                        <div class="w-12 h-12 bg-gold-500 rounded-full flex items-center justify-center text-white animate-pulse">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <div class="flex-grow">
                            <h6 class="font-black text-sm">Sureja El-Fatiha</h6>
                            <p class="text-[10px] opacity-40">Recitim me titra shqip</p>
                        </div>
                        <div class="text-[10px] font-black opacity-30 tracking-tighter">01:45</div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="nav-container fixed bottom-8 left-6 right-6 h-22 glass-card rounded-[3rem] flex items-center justify-around px-4 shadow-2xl z-[100] border border-white/10">
            <template x-for="nav in navigation">
                <a :href="nav.url" @click.prevent="pageTransition(nav.url)" 
                   class="relative flex flex-col items-center justify-center w-16 h-16 group transition-all"
                   :class="nav.active ? 'text-pri-500' : 'opacity-30 hover:opacity-100'">
                    <div class="group-hover:-translate-y-1 transition-transform duration-300" x-html="nav.icon"></div>
                    <span class="text-[8px] font-black uppercase tracking-widest mt-1.5" x-text="nav.label"></span>
                    <div x-show="nav.active" class="absolute -bottom-1 w-1 h-1 bg-pri-500 rounded-full"></div>
                </a>
            </template>
        </nav>
    </div>

    <script>
        function libraryCore() {
            return {
                settings: { darkMode: localStorage.getItem('darkMode') === 'true' },
                count: 0,
                
                get targetReached() {
                    if (this.count === 33) return 'SubhanAllah (33)';
                    if (this.count === 66) return 'Elhamdulilah (66)';
                    if (this.count === 99) return 'Allahu Ekber (99)';
                    return 'Vazhdo...';
                },

                collections: [
                    { title: 'Duatë e Namazit', count: '15 Artikuj', icon: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 21c4.418 0 8-3.582 8-8V5l-8-3-8 3v8c0 4.418 3.582 8 8 8z"/></svg>' },
                    { title: 'Suret e shkurtra', count: '10 Audio', icon: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>' },
                    { title: 'Emrat e Allahut', count: '99 Emra', icon: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' }
                ],

                navigation: [
                    { label: 'Kreu', url: 'index.html', active: false, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>' },
                    { label: 'Mëso', url: 'meso.html', active: false, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>' },
                    { label: 'Libraria', url: 'libraria.html', active: true, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>' },
                    { label: 'Settings', url: 'settings.html', active: false, icon: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg>' }
                ],

                pageTransition(url) {
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = url; }, 500);
                },

                init() {
                    window.addEventListener('load', () => document.body.classList.add('loaded'));
                }
            }
        }
    </script>
</body>
</html>
